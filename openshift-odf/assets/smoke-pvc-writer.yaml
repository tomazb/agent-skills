apiVersion: v1
kind: Namespace
metadata:
  name: odf-smoke
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: smoke-pvc
  namespace: odf-smoke
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: ocs-storagecluster-ceph-rbd
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: smoke-writer
  namespace: odf-smoke
spec:
  containers:
  - name: writer
    image: registry.access.redhat.com/ubi9/ubi-minimal
    command: ["sh", "-c", "echo odf-smoke-ok > /data/smoke-probe && sync && sleep 3600"]
    volumeMounts:
    - name: data
      mountPath: /data
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: smoke-pvc

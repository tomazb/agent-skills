name: Build Skill Artifacts

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation and test dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Validate all skill directories
        run: python3 scripts/validate_skill_collection.py

      - name: Validate production resilience reviewer package
        run: python3 production-resilience-reviewer/tools/validate_skill_package.py

      - name: Run full test suite with package isolation
        run: python3 scripts/run_test_suite.py --junit-dir pytest-results

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest-results/*.xml
          if-no-files-found: error

      - name: Build .skill artifacts
        run: python3 scripts/build_skill_artifacts.py

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skill-artifacts
          path: dist/*.skill

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate-and-build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install validation dependencies
        run: python3 -m pip install -r requirements-dev.txt

      - name: Validate all skill directories
        run: python3 scripts/validate_skill_collection.py

      - name: Validate production resilience reviewer package
        run: python3 production-resilience-reviewer/tools/validate_skill_package.py

      - name: Build .skill artifacts
        run: python3 scripts/build_skill_artifacts.py

      - name: Publish release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.skill
